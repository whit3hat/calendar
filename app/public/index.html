<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Family Calendar</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: #0f172a;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      overflow: hidden;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      padding: 0.6rem 0.9rem 0.4rem;
      gap: 0.4rem;
    }

    /* Row containing the calendar and (optionally) the day panel */
    #main-content {
      display: flex;
      flex: 1;
      min-height: 0;
      gap: 0.75rem;
    }

    #calendar-container {
      flex: 1;
      min-height: 0;
      min-width: 0; /* allow flex child to shrink below content width */
    }

    #calendar {
      height: 100%;
    }

    /* ── Day panel ─────────────────────────────────────────────── */
    #day-panel {
      width: 0;
      overflow: hidden;
      flex-shrink: 0;
      transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    #day-panel.open {
      width: 28vw;
    }

    /* Fixed-width inner wrapper — gets clipped by parent overflow:hidden */
    .panel-inner {
      width: 28vw;
      height: 100%;
      display: flex;
      flex-direction: column;
      background: #1e293b;
      border-radius: 12px;
      overflow: hidden;
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem 1rem 0.6rem;
      border-bottom: 1px solid #334155;
      flex-shrink: 0;
    }

    .panel-date {
      font-size: clamp(0.85rem, 1.6vw, 1.1rem);
      font-weight: 600;
      color: #f1f5f9;
    }

    .panel-close {
      background: none;
      border: none;
      color: #64748b;
      font-size: 1.3rem;
      line-height: 1;
      cursor: pointer;
      padding: 0.25rem 0.4rem;
      border-radius: 6px;
      touch-action: manipulation;
      transition: background 0.15s, color 0.15s;
    }

    .panel-close:hover {
      background: #334155;
      color: #e2e8f0;
    }

    /* All-day events strip */
    .panel-allday {
      padding: 0.5rem 0.75rem;
      border-bottom: 1px solid #334155;
      flex-shrink: 0;
      display: none; /* hidden when empty */
    }

    .panel-allday.has-events {
      display: block;
    }

    .panel-allday-label {
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #475569;
      margin-bottom: 0.35rem;
    }

    /* Scrollable timeline */
    .panel-timeline {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      scrollbar-width: thin;
      scrollbar-color: #334155 transparent;
    }

    .panel-timeline::-webkit-scrollbar { width: 4px; }
    .panel-timeline::-webkit-scrollbar-track { background: transparent; }
    .panel-timeline::-webkit-scrollbar-thumb { background: #334155; border-radius: 2px; }

    .hour-slot {
      display: flex;
      align-items: flex-start;
      gap: 0.5rem;
      padding: 0 0.75rem;
      min-height: 3.25rem;
      border-bottom: 1px solid #1a2744;
      position: relative;
    }

    .hour-slot.current-hour {
      background: rgba(59, 130, 246, 0.05);
    }

    .hour-label {
      flex-shrink: 0;
      width: 3.2rem;
      font-size: clamp(0.6rem, 1vw, 0.7rem);
      color: #475569;
      padding-top: 0.55rem;
      text-align: right;
    }

    .hour-events {
      flex: 1;
      min-width: 0;
      padding: 0.3rem 0;
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
    }

    /* Now indicator — red line at current time */
    .now-line {
      position: absolute;
      left: 0;
      right: 0;
      height: 2px;
      background: #ef4444;
      z-index: 2;
      pointer-events: none;
    }

    .now-line::before {
      content: '';
      position: absolute;
      left: 3.7rem;
      top: -4px;
      width: 10px;
      height: 10px;
      background: #ef4444;
      border-radius: 50%;
    }

    /* Event chips in panel */
    .panel-event {
      border-radius: 5px;
      padding: 0.25rem 0.5rem;
      font-size: clamp(0.6rem, 1vw, 0.72rem);
      line-height: 1.3;
      overflow: hidden;
    }

    .panel-event-title {
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .panel-event-meta {
      font-size: 0.85em;
      opacity: 0.85;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .panel-empty {
      text-align: center;
      color: #475569;
      font-size: clamp(0.7rem, 1.2vw, 0.85rem);
      padding: 2rem 1rem;
    }

    /* Status bar */
    #status-bar {
      font-size: clamp(0.6rem, 1vw, 0.75rem);
      color: #475569;
      text-align: right;
      flex-shrink: 0;
    }

    /* ── FullCalendar dark theme ──────────────────────────────── */
    :root {
      --fc-border-color: #1e293b;
      --fc-today-bg-color: rgba(59, 130, 246, 0.12);
      --fc-page-bg-color: transparent;
      --fc-neutral-bg-color: rgba(30, 41, 59, 0.5);
      --fc-neutral-text-color: #64748b;
      --fc-button-bg-color: #1e293b;
      --fc-button-border-color: #334155;
      --fc-button-hover-bg-color: #334155;
      --fc-button-hover-border-color: #475569;
      --fc-button-active-bg-color: #3b82f6;
      --fc-button-active-border-color: #3b82f6;
      --fc-event-bg-color: #3b82f6;
      --fc-event-border-color: transparent;
      --fc-event-text-color: #fff;
    }

    .fc-toolbar-title {
      font-size: clamp(1.1rem, 2.8vw, 1.9rem) !important;
      font-weight: 600 !important;
      color: #f1f5f9 !important;
    }

    .fc-header-toolbar {
      margin-bottom: 0.5rem !important;
      align-items: center !important;
    }

    .fc-button-primary {
      border-radius: 8px !important;
      font-size: clamp(0.75rem, 1.4vw, 0.95rem) !important;
      padding: 0.35em 0.75em !important;
      touch-action: manipulation;
      text-transform: capitalize;
      transition: background 0.15s !important;
    }

    /* Highlight the Today button when panel is open */
    .fc-todayPanel-button.panel-active {
      background-color: #3b82f6 !important;
      border-color: #3b82f6 !important;
    }

    .fc-button:focus {
      box-shadow: none !important;
      outline: none !important;
    }

    .fc-col-header-cell {
      background: #1e293b !important;
      border-color: #334155 !important;
    }

    .fc-col-header-cell-cushion {
      color: #64748b !important;
      font-size: clamp(0.6rem, 1.2vw, 0.75rem) !important;
      font-weight: 700 !important;
      text-decoration: none !important;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      padding: 0.5rem 0 !important;
      pointer-events: none;
    }

    .fc-daygrid-day {
      background: transparent !important;
      border-color: #1e293b !important;
    }

    .fc-daygrid-day-frame {
      min-height: 0 !important;
    }

    .fc-daygrid-day-number {
      color: #94a3b8 !important;
      font-size: clamp(0.7rem, 1.3vw, 0.9rem) !important;
      text-decoration: none !important;
      padding: 0.35rem 0.5rem !important;
      pointer-events: none;
      line-height: 1;
    }

    .fc-day-today .fc-daygrid-day-top {
      display: flex;
      justify-content: flex-end;
    }

    .fc-day-today .fc-daygrid-day-number {
      background: #3b82f6 !important;
      color: #fff !important;
      border-radius: 50%;
      width: clamp(1.4rem, 2.2vw, 1.8rem);
      height: clamp(1.4rem, 2.2vw, 1.8rem);
      display: flex !important;
      align-items: center;
      justify-content: center;
      padding: 0 !important;
      margin: 0.2rem;
    }

    .fc-day-other .fc-daygrid-day-number {
      color: #334155 !important;
    }

    .fc-event {
      border-radius: 4px !important;
      border: none !important;
      font-size: clamp(0.6rem, 1.05vw, 0.72rem) !important;
      padding: 1px 5px !important;
      margin: 1px 3px !important;
      cursor: default !important;
    }

    .fc-event-title {
      font-weight: 500 !important;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .fc-daygrid-more-link {
      color: #64748b !important;
      font-size: clamp(0.55rem, 0.9vw, 0.68rem) !important;
      text-decoration: none !important;
      margin: 0 3px !important;
    }

    .fc-scrollgrid,
    .fc-scrollgrid td,
    .fc-scrollgrid th {
      border-color: #1e293b !important;
    }

    .fc-scroller {
      overflow: hidden !important;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="main-content">

      <div id="calendar-container">
        <div id="calendar"></div>
      </div>

      <div id="day-panel">
        <div class="panel-inner">
          <div class="panel-header">
            <div class="panel-date" id="panel-date-label"></div>
            <button class="panel-close" id="panel-close-btn" aria-label="Close panel">&#x2715;</button>
          </div>
          <div class="panel-allday" id="panel-allday"></div>
          <div class="panel-timeline" id="panel-timeline"></div>
        </div>
      </div>

    </div>
    <div id="status-bar">Loading calendars…</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>
  <script>
    // ── State ─────────────────────────────────────────────────────
    let allEvents = [];      // latest fetched events from /api/events
    let panelOpen = false;
    let calendarInstance = null;
    let lastFetchedAt = null;
    let fetchError = false;

    // ── Helpers ───────────────────────────────────────────────────
    const DAYS   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const MONTHS = ['January','February','March','April','May','June','July',
                    'August','September','October','November','December'];

    function todayDateString() {
      const n = new Date();
      return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}`;
    }

    function localDateString(date) {
      return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
    }

    function formatTime(isoString) {
      const d = new Date(isoString);
      let h = d.getHours();
      const m = d.getMinutes();
      const ampm = h >= 12 ? 'PM' : 'AM';
      h = h % 12 || 12;
      return m ? `${h}:${String(m).padStart(2,'0')} ${ampm}` : `${h} ${ampm}`;
    }

    function hourLabel(h) {
      if (h === 0)  return '12 AM';
      if (h < 12)   return `${h} AM`;
      if (h === 12) return '12 PM';
      return `${h - 12} PM`;
    }

    // Returns true if the event falls on today (local time)
    function isToday(ev) {
      const today = todayDateString();
      if (ev.allDay) {
        // all-day end is exclusive (next day), start is YYYY-MM-DD
        return ev.start <= today && (!ev.end || ev.end > today);
      }
      return localDateString(new Date(ev.start)) === today;
    }

    // ── Status bar ────────────────────────────────────────────────
    const statusEl = document.getElementById('status-bar');

    function updateStatus() {
      if (fetchError) {
        statusEl.textContent = 'Could not reach server — showing last loaded data';
        statusEl.style.color = '#f87171';
        return;
      }
      if (!lastFetchedAt) return;
      const mins = Math.floor((Date.now() - lastFetchedAt) / 60000);
      statusEl.style.color = '#475569';
      statusEl.textContent = mins < 1
        ? 'Last updated: just now'
        : `Last updated: ${mins} minute${mins === 1 ? '' : 's'} ago`;
    }

    // ── Day panel ─────────────────────────────────────────────────
    function renderPanel() {
      const now = new Date();
      const todayEvents = allEvents.filter(isToday);

      // Header date label
      document.getElementById('panel-date-label').textContent =
        `${DAYS[now.getDay()]}, ${MONTHS[now.getMonth()]} ${now.getDate()}`;

      // All-day section
      const alldayEl = document.getElementById('panel-allday');
      const alldayEvents = todayEvents.filter(ev => ev.allDay);
      if (alldayEvents.length) {
        alldayEl.classList.add('has-events');
        alldayEl.innerHTML = `<div class="panel-allday-label">All Day</div>` +
          alldayEvents.map(ev => `
            <div class="panel-event" style="background:${ev.color};color:#fff;margin-bottom:0.2rem">
              <div class="panel-event-title">${ev.title}</div>
            </div>`).join('');
      } else {
        alldayEl.classList.remove('has-events');
        alldayEl.innerHTML = '';
      }

      // Timeline
      const timedEvents = todayEvents.filter(ev => !ev.allDay);
      const timeline = document.getElementById('panel-timeline');

      // Build a map: hour → events starting in that hour
      const byHour = {};
      for (const ev of timedEvents) {
        const h = new Date(ev.start).getHours();
        (byHour[h] = byHour[h] || []).push(ev);
      }

      const currentHour = now.getHours();
      const currentMin  = now.getMinutes();

      let html = '';
      for (let h = 0; h < 24; h++) {
        const isCurrent = h === currentHour;
        const eventsHere = byHour[h] || [];

        // Now-indicator position within this hour slot (% of slot height)
        const nowLineStyle = isCurrent
          ? `top: calc(${(currentMin / 60) * 100}%)`
          : '';

        html += `<div class="hour-slot${isCurrent ? ' current-hour' : ''}" data-hour="${h}">`;
        if (isCurrent) html += `<div class="now-line" style="${nowLineStyle}"></div>`;
        html += `<div class="hour-label">${hourLabel(h)}</div>`;
        html += `<div class="hour-events">`;

        for (const ev of eventsHere) {
          const timeRange = ev.end
            ? `${formatTime(ev.start)} – ${formatTime(ev.end)}`
            : formatTime(ev.start);
          html += `
            <div class="panel-event" style="background:${ev.color};color:#fff">
              <div class="panel-event-title">${ev.title}</div>
              <div class="panel-event-meta">${timeRange} · ${ev.extendedProps.calendarName}</div>
            </div>`;
        }

        html += `</div></div>`;
      }

      // Show empty state if no events at all today
      if (!todayEvents.length) {
        html += `<div class="panel-empty">No events today</div>`;
      }

      timeline.innerHTML = html;

      // Scroll to current hour (offset by 1 so there's context above)
      const scrollToSlot = timeline.querySelector(`[data-hour="${Math.max(0, currentHour - 1)}"]`);
      if (scrollToSlot) scrollToSlot.scrollIntoView({ block: 'start' });
    }

    function openPanel() {
      panelOpen = true;
      document.getElementById('day-panel').classList.add('open');
      document.querySelector('.fc-todayPanel-button')?.classList.add('panel-active');
      renderPanel();
      // Let the CSS transition finish before telling FullCalendar to resize
      document.getElementById('day-panel').addEventListener('transitionend', () => {
        calendarInstance?.updateSize();
      }, { once: true });
    }

    function closePanel() {
      panelOpen = false;
      document.getElementById('day-panel').classList.remove('open');
      document.querySelector('.fc-todayPanel-button')?.classList.remove('panel-active');
      document.getElementById('day-panel').addEventListener('transitionend', () => {
        calendarInstance?.updateSize();
      }, { once: true });
    }

    function togglePanel() {
      panelOpen ? closePanel() : openPanel();
    }

    // ── Init ──────────────────────────────────────────────────────
    document.addEventListener('DOMContentLoaded', () => {

      document.getElementById('panel-close-btn').addEventListener('click', closePanel);

      calendarInstance = new FullCalendar.Calendar(
        document.getElementById('calendar'),
        {
          initialView: 'dayGridMonth',
          height: '100%',

          // Replace the built-in today button with our custom toggle
          customButtons: {
            todayPanel: {
              text: 'Today',
              click() {
                calendarInstance.today(); // navigate month view to current month
                togglePanel();
              },
            },
          },

          headerToolbar: {
            left: 'prev,next todayPanel',
            center: 'title',
            right: '',
          },

          firstDay: 0,
          fixedWeekCount: true,

          events(info, successCallback, failureCallback) {
            fetch('/api/events')
              .then(r => {
                if (!r.ok) throw new Error(`HTTP ${r.status}`);
                return r.json();
              })
              .then(data => {
                allEvents = data;
                fetchError = false;
                lastFetchedAt = Date.now();
                updateStatus();
                // Re-render panel in case it's open and events changed
                if (panelOpen) renderPanel();
                successCallback(data);
              })
              .catch(err => {
                console.error('Event fetch failed:', err);
                fetchError = true;
                updateStatus();
                failureCallback(err);
              });
          },
        }
      );

      calendarInstance.render();
      openPanel(); // show today's schedule by default on load

      // Auto-refresh every 60 s
      setInterval(() => calendarInstance.refetchEvents(), 60000);
      // Update "X minutes ago" text every 30 s
      setInterval(updateStatus, 30000);
    });
  </script>
</body>
</html>
