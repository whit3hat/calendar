# ================================================================
# vdirsyncer Configuration Template — Pi Family Calendar
# ================================================================
# This file is a TEMPLATE with placeholder values.
# setup.sh fills in real credentials automatically during setup.
#
# To configure manually:
#   1. Copy to ~/.config/vdirsyncer/config
#   2. Replace YOUR_ICLOUD_EMAIL and YOUR_APP_SPECIFIC_PASSWORD
#   3. Set permissions:  chmod 600 ~/.config/vdirsyncer/config
#   4. Run: vdirsyncer discover family_calendar
#   5. Run: vdirsyncer sync
#
# App-specific password:
#   appleid.apple.com → Sign-In and Security → App-Specific Passwords
#   Click + and label it "vdirsyncer"
#
# NOTE: Never commit your real credentials (~/.config/vdirsyncer/config)
#       to the repository. Only this template belongs in version control.
# ================================================================

[general]
# Where vdirsyncer stores sync state between runs
status_path = "~/.local/share/vdirsyncer/status/"

# ── Sync Pair ─────────────────────────────────────────────────
# Pairs the local .ics files on disk with iCloud CalDAV.
# vdirsyncer discovers and syncs all calendars the iCloud
# account has access to (personal + any shared family calendars).
[pair family_calendar]
a = "family_local"
b = "family_icloud"
collections = ["from a", "from b"]

# iCloud is the source of truth.
# If the same event is changed on both sides between sync runs,
# the iCloud version wins.
conflict_resolution = "b wins"

# ── Local Storage ─────────────────────────────────────────────
# Calendar events are stored as .ics files on the Pi.
# The Node.js API server reads from this directory.
# Each calendar appears as a subdirectory containing .ics files.
[storage family_local]
type = "filesystem"
path = "~/.local/share/calendar/"
fileext = ".ics"

# ── iCloud CalDAV ─────────────────────────────────────────────
# Connects to Apple's CalDAV server using an app-specific password.
# Do NOT use your main Apple ID password here.
[storage family_icloud]
type = "caldav"
url = "https://caldav.icloud.com/"
username = "YOUR_ICLOUD_EMAIL"            # e.g. yourname@icloud.com
password = "YOUR_APP_SPECIFIC_PASSWORD"  # xxxx-xxxx-xxxx-xxxx

# ── Notes ─────────────────────────────────────────────────────
# iCloud limitation: create new calendar folders from an iPhone
# or iCloud.com — do not try to create them via vdirsyncer.
# Once a calendar folder exists in iCloud, vdirsyncer can read
# and write events inside it without any issues.
#
# Cron job (added by setup.sh):
#   */5 * * * *  ~/.local/bin/vdirsyncer sync >> ~/.local/share/vdirsyncer/sync.log 2>&1
#
# Useful commands:
#   vdirsyncer discover family_calendar   — re-scan for new calendars
#   vdirsyncer sync                       — manual sync now
#   tail -f ~/.local/share/vdirsyncer/sync.log  — watch live sync log
